# 1. O DOMÍNIO (O topo da pirâmide de negócio)
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: financeiro-zetra-bank
  description: Setor Financeiro da Organização
spec:
  owner: group:diretoria-financeira # Grupo que manda no setor como um todo
---
# 2. O SISTEMA (conjunto de componentes)
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: banking-system
  description: Core Banking e serviços de conta corrente
spec:
  owner: group:conta-corrente
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: pix-ecosystem
  description: Ecossistema de pagamentos instantâneos (Pix)
spec:
  owner: group:pix
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: card-services
  description: Gestão de cartões, limites e autorizações
spec:
  owner: group:cartoes-credito
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: wealth-manager
  description: Gestão de investimentos e produtos financeiros
spec:
  owner: group:produtos-financeiros
---
# 3. OS GRUPOS (Times de pessoas)
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: cartoes-credito
spec:
  type: team
  owner: user:emanuel-silva
  parent: diretoria-financeira
  children: [] 
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: conta-corrente
spec:
  type: team
  owner: user:pedro-rodrigues 
  parent: diretoria-financeira
  children: []  
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: pix
spec:
  type: team
  owner: user:viviane-rodrigues
  parent: diretoria-financeira
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: produtos-financeiros
spec:
  type: team
  parent: diretoria-financeira
  owner: user:edna-lemos
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: diretoria-financeira
  description: "Diretoria executiva financeira"
spec:
  type: department
  children: [cartoes-credito, conta-corrente, pix, produtos-financeiros]

---
# 4. OS USUÁRIOS (Vinculados aos Grupos)
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: emanuel-silva
  description: "Responsável Técnico - Cartões de Crédito"
spec:
  memberOf: [cartoes-credito]
  profile:
    displayName: Emanuel silva
    title: Gestor de Cartões de Crédito
    email: emanuel.silva@engdb.com.br
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: viviane-rodrigues
  description: "Responsável Técnico - Pix"
spec:
  memberOf: [pix]
  profile:
    displayName: Viviane Rodrigues
    title: Gestora de Pix
    email: viviane.rodrigues@engdb.com.br
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: pedro-rodrigues
  description: "Responsável Técnico - Conta Corrente"
spec:
  memberOf: [conta-corrente]
  profile:
    displayName: Pedro Rodrigues
    title: Gestor de Conta Corrente
    email: pedro.rodrigues@engdb.com.br
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: edna-lemos
  description: "Responsável Técnico - Produtos Financeiros"
spec:
  memberOf: [produtos-financeiros]
  profile:
    displayName: Edna Lemos
    title: Gestora de Produtos Financeiros
    email: edna.lemos@engdb.com.br

